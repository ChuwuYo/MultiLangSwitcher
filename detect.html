<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title></title>
  <!-- 字体预加载 -->
  <link rel="preload" href="fonts/MapleMonoNL-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link href="bootstrap.min.css" rel="stylesheet">
  <link href="fonts/MapleMonoNL-Regular.woff2" rel="stylesheet">
  <link href="toggle.css" rel="stylesheet">
  <link href="shared/copy-button.css" rel="stylesheet">
  <script src="shared/theme-init.js"></script>
  <style>
    body {
      padding: 20px;
    }

    .header-info {
      margin-top: 20px;
    }

    pre {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
    }

    @font-face {
      font-family: 'MapleMonoNL';
      src: url('fonts/MapleMonoNL-Regular.woff2') format('woff2');
    }

    body {
      font-family: 'MapleMonoNL', sans-serif;
    }

    .list-group-item-success .badge {
      background-color: #28a745;
      color: white;
    }

    .list-group-item-danger .badge {
      background-color: #dc3545;
      color: white;
    }

    .ai-diagnosis-card {
      border: 1px solid rgba(13, 110, 253, 0.2);
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.08);
    }

    .ai-diagnosis-card .card-header {
      background: linear-gradient(135deg, #43ddb6, #52d0d9);
    }

    .ai-config-details summary {
      cursor: pointer;
      font-weight: 600;
      user-select: none;
    }

    .ai-config-details[open] summary {
      margin-bottom: 12px;
    }

    .ai-config-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .ai-provider-row {
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
      margin-bottom: 12px;
    }

    .ai-provider-description {
      min-height: 20px;
    }

    .ai-config-hint {
      min-height: 20px;
    }

    .ai-chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 160px;
      max-height: 480px;
      overflow-y: auto;
      padding: 12px;
      border: 1px solid var(--bs-border-color);
      border-radius: 10px;
      background: rgba(248, 249, 250, 0.8);
    }

    html[data-bs-theme="dark"] .ai-chat-messages {
      background: rgba(33, 37, 41, 0.65);
    }

    .ai-chat-message {
      position: relative;
      max-width: 100%;
      padding: 12px 48px 12px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      word-break: break-word;
    }

    .ai-chat-message-content {
      white-space: pre-wrap;
    }

    .ai-chat-message-user {
      align-self: flex-end;
      background: rgba(13, 110, 253, 0.12);
      border-color: rgba(13, 110, 253, 0.2);
    }

    .ai-chat-message-assistant {
      align-self: stretch;
      background: rgba(25, 135, 84, 0.08);
      border-color: rgba(25, 135, 84, 0.18);
    }

    .ai-chat-message pre,
    .ai-chat-message code {
      font-family: 'MapleMonoNL', monospace;
    }

    .ai-chat-message p:last-child,
    .ai-chat-message ul:last-child,
    .ai-chat-message ol:last-child,
    .ai-chat-message pre:last-child {
      margin-bottom: 0;
    }

    .ai-chat-composer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ai-chat-composer-main {
      flex: 1 1 420px;
    }

    .ai-chat-composer textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
    }

    .ai-chat-composer-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 0 0 170px;
    }

    .ai-chat-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>

<body>
  <button id="themeToggleBtn" class="toggle" title="Toggle Theme"></button>

  <div class="container">
    <h2 id="pageHeading"></h2>
    <p class="lead" id="pageSubtitle"></p>

    <div class="alert alert-info">
      <strong id="tipLabel"></strong> <span id="tipText"></span>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="card mb-3 ai-diagnosis-card">
          <div class="card-header text-white">
            <h4 class="mb-1" id="aiDiagnosisTitle"></h4>
            <p class="mb-0 small text-white-50" id="aiDiagnosisSubtitle"></p>
          </div>
          <div class="card-body">
            <details class="ai-config-details mb-3" id="aiConfigDetails" open>
              <summary id="aiConfigSummary"></summary>

              <div class="ai-provider-row mt-3">
                <div>
                  <label class="form-label" for="aiProviderSelect" id="aiProviderLabel"></label>
                  <select class="form-select" id="aiProviderSelect"></select>
                </div>
                <div class="d-flex flex-column justify-content-end">
                  <p class="small text-muted mb-0 ai-provider-description" id="aiProviderDescription"></p>
                </div>
              </div>

              <div class="ai-config-grid">
                <div>
                  <label class="form-label" for="aiBaseUrlInput" id="aiBaseUrlLabel"></label>
                  <input class="form-control" type="url" id="aiBaseUrlInput" autocomplete="off">
                </div>
                <div>
                  <label class="form-label" for="aiModelInput" id="aiModelLabel"></label>
                  <input class="form-control" type="text" id="aiModelInput" autocomplete="off">
                </div>
                <div>
                  <label class="form-label" for="aiApiKeyInput" id="aiApiKeyLabel"></label>
                  <div class="input-group">
                    <input class="form-control" type="password" id="aiApiKeyInput" autocomplete="off">
                    <button class="btn btn-outline-secondary" type="button" id="aiApiKeyToggle"></button>
                  </div>
                </div>
              </div>

              <p class="small text-muted mt-3 mb-1" id="aiPrivacyHint"></p>
              <p class="small mb-0 ai-config-hint" id="aiConfigHint"></p>
            </details>

            <div class="ai-chat-actions mb-3">
              <button class="btn btn-primary" type="button" id="aiStartButton"></button>
              <button class="btn btn-outline-danger" type="button" id="aiStopButton" disabled></button>
              <button class="btn btn-outline-secondary" type="button" id="aiClearButton"></button>
            </div>

            <div class="ai-chat-messages mb-3" id="aiChatMessages"></div>
            <div class="small text-muted mb-3" id="aiChatStatus" aria-live="polite" role="status"></div>

            <div class="ai-chat-composer">
              <div class="ai-chat-composer-main">
                <label class="visually-hidden" for="aiUserInput" id="aiUserInputLabel"></label>
                <textarea class="form-control" id="aiUserInput"></textarea>
              </div>
              <div class="ai-chat-composer-actions">
                <button class="btn btn-success" type="button" id="aiSendButton"></button>
                <button class="btn btn-outline-secondary" type="button" id="aiExportButton"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3">
          <div class="card-header bg-primary text-white" id="requestHeaderTitle"></div>
          <div class="card-body">
            <div id="headerLanguageInfo"></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3">
          <div class="card-header bg-info text-white" id="jsLanguageTitle"></div>
          <div class="card-body">
            <div id="jsLanguageInfo"></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3">
          <div class="card-header bg-secondary text-white" id="intlApiTitle"></div>
          <div class="card-body">
            <div id="intlApiInfo"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card mb-3">
          <div class="card-header bg-warning text-dark" id="webRtcTitle"></div>
          <div class="card-body">
            <div id="webRtcInfo"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card mb-3">
          <div class="card-header bg-success text-white" id="browserFingerprintTitle"></div>
          <div class="card-body">
            <div id="fingerprintInfo"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 兼容性检查 -->
    <div class="row">
      <div class="col-md-12">
        <div class="card mb-3">
          <div class="card-header bg-dark text-white" id="browserCompatibilityTitle"></div>
          <div class="card-body">
            <p><strong id="browserInfoLabel"></strong> <span id="browserInfoDisplay"></span></p>
            <h5 id="apiSupportTitle"></h5>
            <ul id="apiCompatibilityList" class="list-group">
              <!-- JS will populate API compatibility info here -->
              <li class="list-group-item" id="detectingItem"></li>
            </ul>
          </div>
        </div>
      </div>
    </div>


    <div class="row">
      <div class="col-md-12">
        <div class="card mb-3">
          <div class="card-header bg-dark text-white" id="hardwareFingerprintTitle"></div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <div class="card h-100">
                  <div class="card-header bg-light text-dark" id="canvasFingerprintTitle"></div>
                  <div class="card-body">
                    <div id="canvasFingerprintInfo"></div>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card h-100">
                  <div class="card-header bg-light text-dark" id="webglFingerprintTitle"></div>
                  <div class="card-body">
                    <div id="webglFingerprintInfo"></div>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card h-100">
                  <div class="card-header bg-light text-dark" id="audioFingerprintTitle"></div>
                  <div class="card-body">
                    <div id="audioFingerprintInfo"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="header-info mt-4">
      <h4 id="completeHeadersTitle"></h4>
      <pre id="headerInfo"></pre>
    </div>
  </div>

  <!-- 按正确顺序加载脚本 -->
  <script src="shared/shared-utils.js"></script>
  <script src="shared/shared-i18n-base.js"></script>
  <script src="shared/md5.js"></script>
  <script src="shared/header-check-utils.js"></script>
  <script src="shared/shared-resource-manager.js"></script>
  <script src="shared/ai-provider-presets.js"></script>
  <script src="shared/copy-button.js"></script>
  <script src="shared/vendor/marked.umd.min.js"></script>
  <script src="shared/vendor/purify.min.js"></script>
  <script src="shared/ai-chat-client.js"></script>
  <!-- 预加载翻译文件 -->
  <script src="i18n/detect-en.js"></script>
  <script src="i18n/detect-zh.js"></script>
  <script src="i18n/detect-i18n.js"></script>
  <script src="detect.js"></script>
  <script src="detect-ai.js"></script>
  <script type="module" src="toggle.js"></script>
</body>

</html>
